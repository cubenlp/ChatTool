services:
  browserless:
    image: ghcr.io/browserless/chromium:latest
    container_name: browserless-chromium
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      TOKEN: ${TOKEN:-}
      CONCURRENT: ${CONCURRENT:-5}
      TIMEOUT: ${TIMEOUT:-60000}
      QUEUED: ${QUEUED:-20}
      CORS: "true"
      CORS_ALLOW_ORIGIN: "*"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/pressure"]
      interval: 30s
      timeout: 5s
      retries: 5
