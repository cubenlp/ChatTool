name: Publish Package

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Verify tag matches package version
        run: |
          tag_name="${GITHUB_REF_NAME#v}"
          package_version="$(python3 - <<'PY'
          import ast
          from pathlib import Path

          module = ast.parse(Path("src/chattool/__init__.py").read_text(encoding="utf-8"))
          for stmt in module.body:
              if not isinstance(stmt, ast.Assign):
                  continue
              if any(isinstance(target, ast.Name) and target.id == "__version__" for target in stmt.targets):
                  print(ast.literal_eval(stmt.value))
                  break
          else:
              raise SystemExit("__version__ not found in src/chattool/__init__.py")
          PY
          )"

          if [[ "$tag_name" != "$package_version" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $package_version"
            exit 1
          fi
          echo "PACKAGE_VERSION=$package_version" >> "$GITHUB_ENV"
      - name: Fail if version already exists on PyPI
        run: |
          python3 - <<'PY'
          import os
          import sys
          import urllib.error
          import urllib.request

          package = "chattool"
          version = os.environ["PACKAGE_VERSION"]
          url = f"https://pypi.org/pypi/{package}/{version}/json"

          try:
              urllib.request.urlopen(url)
          except urllib.error.HTTPError as exc:
              if exc.code == 404:
                  print(f"{package} {version} is not yet on PyPI; continuing.")
                  sys.exit(0)
              raise
          else:
              print(
                  f"{package} {version} is already on PyPI. "
                  "Bump src/chattool/__init__.py and merge that change before pushing a release tag."
              )
              sys.exit(1)
          PY
      - name: Set up Python "3.9"
        uses: actions/setup-python@v2
        with:
          python-version: "3.9"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]
      - name: Build and publish to PyPI
        env:
          TWINE_USERNAME: ${{ secrets.PYPI_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
        run: |
          python3 -m build
          twine check dist/*
          twine upload dist/*
