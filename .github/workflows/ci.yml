name: Python Package

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_API_BASE_URL: ${{ secrets.OPENAI_API_BASE_URL }}
      OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
      OPENAI_API_MODEL: ${{ secrets.OPENAI_API_MODEL }}
      ZULIP_SITE: ${{ secrets.ZULIP_SITE }}
      ZULIP_BOT_EMAIL: ${{ secrets.ZULIP_BOT_EMAIL }}
      ZULIP_BOT_API_KEY: ${{ secrets.ZULIP_BOT_API_KEY }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-latest

    steps:
    - uses: actions/checkout@v2
    - name: Set up Python 3.10
      uses: actions/setup-python@v2
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install .[dev]
    - name: Run stable smoke tests
      run: |
        python -m pytest -q \
          tests/test_setup_alias.py \
          tests/skills/test_cli.py \
          tests/skills/test_skill_assets.py \
          tests/tools/github/test_cli.py \
          mock-cli-tests/gh
