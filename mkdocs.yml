site_name: ChatTool 文档
site_url: https://chattool.wzhecnu.cn
repo_url: https://github.com/CubeNLP/ChatTool
repo_name: ChatTool
edit_uri: edit/master/docs/

theme:
  name: material
  palette:
    primary: teal
    accent: purple
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.instant
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate

plugins:
  - search:
      lang: zh
  - minify:
      minify_html: true
  - awesome-pages
  - redirects:
      redirect_maps:
        'setup/docker.md': 'env/docker.md'
        'setup/index.md': 'env/index.md'
        'setup/chrome.md': 'env/chrome.md'
        'setup/codex.md': 'env/codex.md'
        'setup/frp.md': 'env/frp.md'
        'setup/nginx_proxy.md': 'env/nginx_proxy.md'
        'mcp/dns.md': 'tools/dns/mcp.md'
        'mcp/network.md': 'tools/network/mcp.md'
        'tools/dns.md': 'tools/dns/index.md'
        'tools/network.md': 'tools/network/index.md'
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: zh
          default: true
          name: 简体中文
          build: true
        - locale: en
          name: English
          build: true

markdown_extensions:
  - admonition
  - codehilite:
      guess_lang: false
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.highlight:
      use_pygments: true
      pygments_style: friendly
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji
  - pymdownx.inlinehilite
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - def_list
  - attr_list
  - md_in_html

extra_javascript:
  - https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.0/MathJax.js?config=TeX-AMS-MML_HTMLorMML

extra_css:
  - assets/css/admonition-custom.css
  - assets/css/custom.css
  - https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css

extra:
  version:
    provider: mike
    default: latest
    alias: true

nav:
  - 主页:
    - 快速开始: index.md

  - LLM:
    - 客户端指南: client.md
    - Chat 对象: chat.md

  - 配置管理:
    - 概览: configuration.md

  - 工具箱:
    - DNS 工具: tools/dns/index.md
    - DNS MCP: tools/dns/mcp.md
    - AI 绘图: tools/image.md
    - FRP 内网穿透: tools/frp.md
    - 网络扫描: tools/network/index.md
    - 网络扫描 MCP: tools/network/mcp.md
    - TP-Link 路由器: tools/tplogin.md

  - 飞书机器人:
    - 概览: larkbot/index.md
    - 飞书平台配置: larkbot/feishu-setup.md
    - 快速开始: larkbot/quickstart.md
    - 消息发送: larkbot/messaging.md
    - 接收消息与路由: larkbot/receiving.md
    - AI 对话集成: larkbot/ai-chat.md
    - 交互卡片: larkbot/cards.md
    - 命令行工具: larkbot/cli.md

  - MCP 服务:
    - 服务指南: mcp/index.md
    - Zulip 集成: mcp/zulip.md

  - 环境配置:
    - 概览: env/index.md
    - Chrome 环境: env/chrome.md
    - Codex 配置: env/codex.md
    - FRP 安装: env/frp.md
    - Nginx 反向代理: env/nginx_proxy.md
    - Docker 模板: env/docker.md

  - Design:
    - 设计文档: design/index.md

  - 博客:
    - 白嫖 AI 生图实战: blog/free-image-guide.md
    - 从代码到 Agent 技能: blog/code_tool_skill.md
    - v0.5.3 飞书机器人: blog/larkbot_v053.md
    - 飞书机器人教程: blog/larkbot-tutorial.md
